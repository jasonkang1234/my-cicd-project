name: Simple CI/CD Pipeline

# This section defines what triggers the workflow
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A workflow consists of one or more jobs
jobs:
  build-and-test:
    # Specifies the operating system for the runner
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed
    steps:
      # Step 1: Check out the repository code onto the runner
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up a programming environment (e.g., Node.js)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Run a custom script or command
      - name: Run a simple test
        run: |
          echo "Running tests..."
          echo "Node version:"
          node -v
          echo "Tests passed successfully!"
